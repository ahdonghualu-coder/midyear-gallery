<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#24180;&#20013;&#27719;&#25253;&#22270;&#29255;&#22681;</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5f0;
      --ink: #22201d;
      --muted: #756f66;
      --line: #e3ded5;
      --panel: #fffdf8;
      --accent: #b94135;
      --accent-2: #276b5f;
      --shadow: 0 14px 36px rgba(47, 38, 28, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 245, 240, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .bar {
      max-width: 1560px;
      margin: 0 auto;
      padding: 14px 22px 12px;
      display: grid;
      gap: 14px;
    }

    .topline {
      display: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.06;
      font-weight: 800;
    }

    .summary {
      display: none;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 248, .76);
      padding: 7px 11px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 320px;
      gap: 12px;
      align-items: center;
      justify-content: start;
    }

    .search {
      width: 320px;
      max-width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
    }

    .search:focus {
      border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
      box-shadow: 0 0 0 4px rgba(185, 65, 53, .12);
    }

    .filters {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      padding-bottom: 2px;
      align-items: center;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .filter-item {
      position: relative;
      padding-bottom: 12px;
      margin-bottom: -12px;
    }

    .submenu {
      position: absolute;
      left: 0;
      top: 100%;
      min-width: 230px;
      max-width: min(360px, calc(100vw - 32px));
      max-height: 380px;
      overflow: auto;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .12s ease, transform .12s ease;
    }

    .filter-item:hover > .submenu,
    .filter-item:focus-within > .submenu {
      display: grid;
      gap: 4px;
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .submenu button {
      width: 100%;
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 0 10px;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .submenu button:hover,
    .submenu button.active {
      background: #eaf1ee;
      color: var(--accent-2);
    }

    .month-menu {
      overflow: visible;
      min-width: 118px;
    }

    .month-item {
      position: relative;
    }

    .month-item::after {
      content: "";
      position: absolute;
      left: 100%;
      top: 0;
      width: 14px;
      height: 100%;
    }

    .month-item > button {
      position: relative;
      padding-right: 28px;
    }

    .month-item > button::after {
      content: ">";
      position: absolute;
      right: 10px;
      color: var(--muted);
    }

    .child-menu {
      left: calc(100% - 2px);
      top: 0;
      min-width: 220px;
      max-height: 360px;
    }

    .month-item:hover > .child-menu,
    .month-item:focus-within > .child-menu {
      display: grid;
      gap: 4px;
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    main {
      max-width: 1560px;
      margin: 0 auto;
      padding: 18px 22px 56px;
    }

    .masonry {
      column-count: 5;
      column-gap: 16px;
    }

    .card {
      display: inline-block;
      width: 100%;
      margin: 0 0 16px;
      break-inside: avoid;
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 6px 18px rgba(47, 38, 28, .08);
      cursor: zoom-in;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      background: #eee9df;
    }

    .meta {
      padding: 10px 12px 12px;
      display: grid;
      gap: 6px;
    }

    .meta strong {
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .meta small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .empty {
      display: none;
      text-align: center;
      padding: 56px 16px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,.6);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(24, 22, 20, .84);
      padding: 24px;
    }

    .lightbox.open {
      display: grid;
      grid-template-columns: 1fr minmax(240px, 330px);
      gap: 18px;
      align-items: center;
    }

    .lightbox img {
      max-width: 100%;
      max-height: calc(100vh - 48px);
      margin: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 22px 80px rgba(0,0,0,.35);
      background: #fff;
    }

    .lightbox aside {
      align-self: stretch;
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .lightbox h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .lightbox p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      padding: 0;
      border-color: rgba(255,255,255,.35);
      background: rgba(255,255,255,.92);
      font-size: 24px;
      line-height: 1;
    }

    @media (max-width: 1280px) { .masonry { column-count: 4; } }
    @media (max-width: 980px) {
      .masonry { column-count: 3; }
      .controls {
        display: flex;
        flex-wrap: wrap;
      }
      .search {
        width: 320px;
        max-width: 100%;
      }
      .filters { flex-wrap: wrap; }
      .summary { justify-content: flex-start; }
      .topline { align-items: start; flex-direction: column; }
    }
    @media (max-width: 680px) {
      .bar, main { padding-left: 14px; padding-right: 14px; }
      .masonry { column-count: 2; column-gap: 10px; }
      .card { margin-bottom: 10px; }
      .meta { padding: 9px; }
      .lightbox.open { grid-template-columns: 1fr; overflow: auto; }
      .lightbox { padding: 14px; }
      .lightbox img { max-height: 72vh; }
      .close { top: 10px; right: 10px; }
    }
  </style>

    const ALL = "\u5168\u90e8";
    const PROMO = "\u63a8\u5e7f\u56fe";
    const state = { category: ALL, query: "", collection: "", month: "" };

    const filters = document.querySelector("#filters");
    const gallery = document.querySelector("#gallery");
    const empty = document.querySelector("#empty");
    const search = document.querySelector("#search");
    const lightbox = document.querySelector("#lightbox");
    const previewImage = document.querySelector("#previewImage");
    const previewTitle = document.querySelector("#previewTitle");
    const previewCollection = document.querySelector("#previewCollection");
    const previewInfo = document.querySelector("#previewInfo");
    const openOriginal = document.querySelector("#openOriginal");

    function textMatch(item) {
      const query = state.query.trim().toLowerCase();
      if (!query) return true;
      return [item.title, item.category, item.collection, decodeURIComponent(item.path)]
        .join(" ")
        .toLowerCase()
        .includes(query);
    }

    function filteredItems() {
      return DATA.items.filter(item => {
        const categoryOk = state.category === ALL || item.category === state.category;
        const collectionOk = !state.collection || item.collection === state.collection;
        const monthOk = !state.month || item.collection.startsWith(`${state.month} /`);
        return categoryOk && collectionOk && monthOk && textMatch(item);
      });
    }

    function promoGroups() {
      const groups = new Map();
      (DATA.menus[PROMO] || []).forEach(item => {
        const match = item.name.match(/^(\d+\u6708)\s*\/\s*(.+)$/);
        const month = match ? match[1] : "\u5176\u4ed6";
        const label = match ? match[2] : item.name;
        if (!groups.has(month)) groups.set(month, []);
        groups.get(month).push({ ...item, label });
      });
      return [...groups.entries()].map(([month, children]) => ({ month, children }));
    }

    function chooseCollection(category, collection) {
      state.category = category;
      state.collection = collection;
      state.month = "";
      search.value = "";
      state.query = "";
      render();
    }

    function chooseMonth(month) {
      state.category = PROMO;
      state.collection = "";
      state.month = month;
      search.value = "";
      state.query = "";
      render();
    }

    function renderFilters() {
      filters.innerHTML = "";
      const all = [{ name: ALL }, ...DATA.categories];
      all.forEach(cat => {
        const wrapper = document.createElement("div");
        wrapper.className = "filter-item";
        const button = document.createElement("button");
        button.type = "button";
        button.className = cat.name === state.category ? "active" : "";
        button.textContent = cat.name;
        button.addEventListener("click", () => {
          state.category = cat.name;
          state.collection = "";
          state.month = "";
          render();
        });
        wrapper.appendChild(button);

        if (cat.name !== ALL && DATA.menus[cat.name]) {
          const menu = document.createElement("div");
          menu.className = cat.name === PROMO ? "submenu month-menu" : "submenu";

          if (cat.name === PROMO) {
            promoGroups().forEach(group => {
              const monthItem = document.createElement("div");
              monthItem.className = "month-item";
              const monthButton = document.createElement("button");
              monthButton.type = "button";
              monthButton.className = state.month === group.month ? "active" : "";
              monthButton.textContent = group.month;
              monthButton.addEventListener("click", event => {
                event.stopPropagation();
                chooseMonth(group.month);
              });

              const childMenu = document.createElement("div");
              childMenu.className = "submenu child-menu";
              group.children.forEach(item => {
                const itemButton = document.createElement("button");
                itemButton.type = "button";
                itemButton.className = state.collection === item.name ? "active" : "";
                itemButton.textContent = item.label;
                itemButton.addEventListener("click", event => {
                  event.stopPropagation();
                  chooseCollection(cat.name, item.name);
                });
                childMenu.appendChild(itemButton);
              });

              monthItem.appendChild(monthButton);
              monthItem.appendChild(childMenu);
              menu.appendChild(monthItem);
            });
          } else {
            DATA.menus[cat.name].forEach(item => {
              const itemButton = document.createElement("button");
              itemButton.type = "button";
              itemButton.className = state.collection === item.name ? "active" : "";
              itemButton.textContent = item.name;
              itemButton.addEventListener("click", event => {
                event.stopPropagation();
                chooseCollection(cat.name, item.name);
              });
              menu.appendChild(itemButton);
            });
          }
          wrapper.appendChild(menu);
        }

        filters.appendChild(wrapper);
      });
    }

    function cardFor(item) {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <img loading="lazy" decoding="async" alt="">
        <div class="meta">
          <strong></strong>
          <small></small>
        </div>
      `;
      const img = card.querySelector("img");
      img.src = item.thumb || item.path;
      img.alt = item.title;
      img.width = item.width;
      img.height = item.height;
      img.dataset.full = item.path;
      card.querySelector("strong").textContent = item.title;
      card.querySelector("small").textContent = `${item.category} \u00b7 ${item.collection}`;
      card.addEventListener("click", () => openPreview(item));
      return card;
    }

    function renderGallery(items) {
      gallery.innerHTML = "";
      const fragment = document.createDocumentFragment();
      items.forEach(item => fragment.appendChild(cardFor(item)));
      gallery.appendChild(fragment);
      empty.style.display = items.length ? "none" : "block";
    }

    function render() {
      const items = filteredItems();
      renderFilters();
      renderGallery(items);
    }

    function openPreview(item) {
      previewImage.src = item.path;
      previewImage.alt = item.title;
      previewTitle.textContent = item.title;
      previewCollection.textContent = `${item.category} / ${item.collection}`;
      previewInfo.textContent = `${item.width} \u00d7 ${item.height}px \u00b7 ${item.modified}`;
      openOriginal.onclick = () => window.open(item.path, "_blank");
      lightbox.classList.add("open");
    }

    function closePreview() {
      lightbox.classList.remove("open");
      previewImage.removeAttribute("src");
    }

    search.addEventListener("input", event => {
      state.query = event.target.value;
      state.collection = "";
      state.month = "";
      render();
    });

    document.querySelector("#close").addEventListener("click", closePreview);
    lightbox.addEventListener("click", event => {
      if (event.target === lightbox) closePreview();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closePreview();
    });

    render();
  </script>
